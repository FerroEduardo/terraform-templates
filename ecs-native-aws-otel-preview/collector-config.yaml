extensions:
  sigv4auth:
    service: "monitoring"
    region: "us-east-1"

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: "0.0.0.0:4317"
      http:
        endpoint: "0.0.0.0:4318"

processors:
  batch:
    send_batch_size: 10
    timeout: 10s
  resource:
    attributes:
      - action: delete
        key: process.command_args

exporters:
  debug:
    verbosity: detailed
  otlphttp:
    tls:
      insecure: false
    endpoint: "https://monitoring.us-east-1.amazonaws.com"
    auth:
      authenticator: sigv4auth
  awsxray:
    region: "us-east-1"

service:
  extensions: [sigv4auth]
  pipelines:
    metrics:
      receivers: [otlp]
      processors: [batch, resource]
      exporters: [debug, otlphttp]
    traces:
      receivers: [otlp]
      exporters: [awsxray]
